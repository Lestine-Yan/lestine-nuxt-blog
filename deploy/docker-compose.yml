services:
  nuxt-blog:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: lestine-nuxt-blog
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/.output/data
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
